name: Update README

# Regenerates README.md from query_params.json (and, if present,
# cleaning_report.json + README_NOTES.md) so the repo's landing page
# reflects the run-specific data selection instead of the verbatim
# template README.
#
# Triggers on a successful "LiPD File Download" workflow run, or on
# manual dispatch (useful after dropping a new cleaning_report.json
# or README_NOTES.md without re-running the download).

on:
  workflow_run:
    workflows: ["LiPD File Download"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-readme:
    name: Regenerate README from query_params.json
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate README.md
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="${{ github.event.repository.name }}"
          PAGES_URL="https://${OWNER_LC}.github.io/${REPO_NAME}/"
          RELEASES_URL="${{ github.server_url }}/${{ github.repository }}/releases"
          python scripts/generate_readme.py \
            --pages-url "${PAGES_URL}" \
            --releases-url "${RELEASES_URL}"

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "README.md is already up to date."
            exit 0
          fi
          git commit -m "Regenerate README from query_params.json"
          git push
